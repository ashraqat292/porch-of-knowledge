<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>The Porch of Knowledge</title>
</head>
<body class="page-one"> 
    <div class="field header">
        <h1>The Porch of Knowledge</h1>
        <h2>Get started</h2>
    </div>

    <div class="field">
        <form action="page2.html">
            <label>User Name:</label><br>
            <input type="text" name="uname" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label>Password:</label><br>
            <input type="password" name="pwd" required><br><br>

            <p>Choose your gender:</p>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br>

            <p>Choose your hobby:</p>
            <input type="checkbox" name="hobby" value="Reading">
            <label>I love reading</label><br>
            <input type="checkbox" name="hobby" value="Gaming">
            <label>I love gaming</label><br>
            <input type="checkbox" name="hobby" value="Drawing">
            <label>I love drawing</label><br><br>

            <button type="submit" class="btn">Submit</button>
        </form>
    </div>
</body>
</html>
